<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>

body{
    margin:0;
}

.compare{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    overflow:hidden;
}

.compare img{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    top:0;
    left:0;
    width:50%;
    height:100%;
    overflow:hidden;
}

.overlay img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.slider{
    position:absolute;
    left:50%;
    top:0;
    width:3px;
    height:100%;
    background:white;
    cursor:ew-resize;
}

.knob{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:40px;
    height:40px;
    border-radius:50%;
    background:white;
    border:2px solid black;
}

</style>
</head>

<body>

<div class="compare" id="compare">

    <img src="before.png">

    <div class="overlay" id="overlay">
        <img src="after.png">
    </div>

    <div class="slider" id="slider">
        <div class="knob"></div>
    </div>

</div>

<script>

const compare=document.getElementById("compare");
const overlay=document.getElementById("overlay");
const slider=document.getElementById("slider");

let drag=false;

slider.onmousedown=()=>drag=true;

window.onmouseup=()=>drag=false;

window.onmousemove=(e)=>{

    if(!drag) return;

    const rect=compare.getBoundingClientRect();

    let x=e.clientX-rect.left;

    x=Math.max(0,Math.min(x,rect.width));

    overlay.style.width=x+"px";
    slider.style.left=x+"px";
}

</script>

</body>
</html>
