<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>

body{
    margin:0;
    padding:0;
}

.compare{
    position:relative;
    width:800px;
    height:450px;
    overflow:hidden;
}

.compare img{
    position:absolute;
    top:0;
    left:0;
    width:800px;
    height:450px;
    object-fit:cover;
}

.before{
    position:absolute;
    top:0;
    left:0;
    width:50%;
    height:100%;
    overflow:hidden;
    z-index:2;
}

.before img{
    position:absolute;
    top:0;
    left:0;
    width:800px;
    height:450px;
}

.slider{
    position:absolute;
    top:0;
    left:50%;
    width:3px;
    height:100%;
    background:white;
    z-index:10;
    cursor:ew-resize;
}

.knob{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:40px;
    height:40px;
    border-radius:50%;
    background:white;
    border:2px solid black;
}

</style>
</head>

<body>

<div class="compare" id="compare">

    <!-- 아래층 -->
    <img src="after.png">

    <!-- 위층 -->
    <div class="before" id="beforeLayer">
        <img src="before.png">
    </div>

    <div class="slider" id="slider">
        <div class="knob"></div>
    </div>

</div>

<script>

const compare = document.getElementById('compare');
const beforeLayer = document.getElementById('beforeLayer');
const slider = document.getElementById('slider');

let dragging = false;

slider.addEventListener('mousedown', () => {
    dragging = true;
});

window.addEventListener('mouseup', () => {
    dragging = false;
});

window.addEventListener('mousemove', (e) => {

    if(!dragging) return;

    const rect = compare.getBoundingClientRect();

    let x = e.clientX - rect.left;

    x = Math.max(0, Math.min(x, rect.width));

    beforeLayer.style.width = x + 'px';
    slider.style.left = x + 'px';

});

</script>

</body>
</html>
